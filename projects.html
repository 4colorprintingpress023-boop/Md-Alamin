<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ডিজাইন শপ | Fx Alamin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f8f9fc; color: #1a1a2e; }
        
        header {
            background: linear-gradient(135deg, #6d28d9, #8b5cf6);
            color: white;
            padding: 20px 0;
            text-align: center;
        }
        .logo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        .logo-area img {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 4px solid white;
        }

        .gallery {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }
        .card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: 0.3s;
        }
        .card:hover { transform: translateY(-8px); }
        .card img { width: 100%; height: 240px; object-fit: cover; }
        .card-info { padding: 20px; text-align: center; }
        .price { font-size: 1.4rem; font-weight: 700; color: #6d28d9; margin: 10px 0; }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            margin: 5px 0;
            width: 100%;
            cursor: pointer;
        }
        .btn-download { background: #10b981; color: white; }
        .btn-order { background: #6d28d9; color: white; }
    </style>
</head>
<body>
    <header>
        <div class="logo-area">
            <img src="my-photo.jpg" alt="Fx Alamin">
            <div>
                <h1 style="font-size:2.2rem;">ডিজাইন শপ</h1>
                <p>প্রিমিয়াম গ্রাফিক ডিজাইন রিসোর্স</p>
            </div>
        </div>
    </header>

    <h2 style="text-align:center; margin:40px 0 30px;">আমার ডিজাইনসমূহ</h2>

    <div class="gallery">
        
        <!-- সাটার স্টিকার ১ -->
        <div class="card">
            <img src="Satar Sticker1.jpg" alt="সাটার স্টিকার">
            <div class="card-info">
                <h3>সাটার স্টিকার ২০২৬</h3>
                <p class="price">৳ ২০</p>
                <button class="btn btn-download" onclick="downloadDesign('Satar Sticker1.jpg', 'STICKER20')">📥 ডাউনলোড করুন</button>
                <button class="btn btn-order" onclick="orderNow('সাটার স্টিকার ২০২৬')">🛒 অর্ডার করুন</button>
            </div>
        </div>

        <!-- সাটার স্টিকার ২ -->
        <div class="card">
            <img src="Satar Sticker2.jpg" alt="সাটার স্টিকার">
            <div class="card-info">
                <h3>সাটার স্টিকার ২০২৬</h3>
                <p class="price">৳ ২০</p>
                <button class="btn btn-download" onclick="downloadDesign('Satar Sticker2.jpg', 'STICKER20')">📥 ডাউনলোড করুন</button>
                <button class="btn btn-order" onclick="orderNow('সাটার স্টিকার ২০২৬')">🛒 অর্ডার করুন</button>
                 <!-- ডিজাইন ১ -->
        <div class="card" onclick="showModal('design1.jpg', 'ফলের উৎসব পোস্টার ২০২৬', 'ফেস্টিভাল পোস্টার, উচ্চমানের প্রিন্ট রেডি', '299', 'FRUIT2026')">
            <img src="design1.jpg" alt="ফলের উৎসব">
            <div class="card-info">
                <h3>ফলের উৎসব পোস্টার ২০২৬</h3>
                <p class="price">৳ ২৯৯</p>
            </div>
        </div>

        <!-- আরেকটা ডিজাইন (উদাহরণ) -->
        <div class="card" onclick="showModal('design2.jpg', 'রমজান স্পেশাল ব্যানার', 'রমজান ক্যাম্পেইন ব্যানার সিরিজ', '499', 'RAMADAN2026')">
            <img src="design2.jpg" alt="রমজান ব্যানার">
            <div class="card-info">
                <h3>রমজান স্পেশাল ব্যানার</h3>
                <p class="price">৳ ৪৯৯</p>
            </div>
        </div>
 <!-- আরেকটা ডিজাইন (উদাহরণ) -->
        <div class="card" onclick="showModal('design3.jpg', 'নবীন বরন 2026', ' ক্যাম্পেইন ব্যানার সিরিজ', '220', '399365')">
            <img src="design3.jpg" alt="নবীন বরন 2026">
            <div class="card-info">
                <h3>ক্যাম্পেইন ব্যানার সিরিজ</h3>
                <p class="price">৳ 220</p>
            </div>
        </div>

    </div>

    <script>
        function downloadDesign(filename, code) {
            const userCode = prompt("ডাউনলোড করতে কোড দিন:");
            if (userCode === code) {
                const link = document.createElement('a');
                link.href = filename;
                link.download = filename;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                alert("✅ ডাউনলোড শুরু হয়েছে!");
            } else {
                alert("❌ ভুল কোড!");
            }
        }

        function orderNow(productName) {
            const phone = "880XXXXXXXXXX"; // তোমার নাম্বার দাও
            const message = `আসসালামু আলাইকুম,%0Aআমি এই ডিজাইনটি কিনতে চাই:%0A*${productName}*`;
            window.open(`https://wa.me/${phone}?text=${message}`, '_blank');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ডিজাইন শপ | Fx Alamin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f8f9fc; color: #1a1a2e; }
        
        header {
            background: linear-gradient(135deg, #6d28d9, #8b5cf6);
            color: white;
            padding: 20px 0;
            text-align: center;
        }
        .logo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        .logo-area img {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 4px solid white;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-area">
            <img src="my-photo.jpg" alt="Fx Alamin">
            <div>
                <h1 style="font-size:2.2rem;">ডিজাইন শপ</h1>
                <p>প্রিমিয়াম গ্রাফিক ডিজাইন রিসোর্স</p>
            </div>
        </div>
    </header>

    <h2 style="text-align:center; margin:40px 0 30px;">আমার ডিজাইনসমূহ</h2>

    <!-- তোমার ডিজাইন কার্ডগুলো এখানে যোগ করো -->
    <div style="max-width:1200px; margin:0 auto; padding:20px; display:grid; grid-template-columns:repeat(auto-fit, minmax(300px,1fr)); gap:25px;">
        
        <div style="background:white; border-radius:16px; overflow:hidden; box-shadow:0 5px 15px rgba(0,0,0,0.1);">
            <img src="design1.jpg" style="width:100%; height:240px; object-fit:cover;">
            <div style="padding:20px; text-align:center;">
                <h3>ফলের উৎসব পোস্টার ২০২৬</h3>
                <p style="color:#6d28d9; font-weight:bold;">৳ ২৯৯</p>
            </div>
            <div style="background:white; border-radius:16px; overflow:hidden; box-shadow:0 5px 15px rgba(0,0,0,0.1);">
            <img src="Satar Sticker1.jpg" style="width:100%; height:240px; object-fit:cover;">
            <div style="padding:20px; text-align:center;">
                <h3>সাটার স্টিকার ২০২৬</h3>
                <p style="color:#6d28d9; font-weight:bold;">৳30</p>

                   <div style="background:white; border-radius:16px; overflow:hidden; box-shadow:0 5px 15px rgba(0,0,0,0.1);">
            <img src="Satar Sticker2.jpg" style="width:100%; height:240px; object-fit:cover;">
            <div style="padding:20px; text-align:center;">
                <h3>সাটার স্টিকার ২০২৬</h3>
                <p style="color:#6d28d9; font-weight:bold;">৳20</p>
        </div>

    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্রজেক্টস</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        header {
            background: rgba(255,255,255,0.15);
            padding: 1rem 0;
            text-align: center;
            margin-bottom: 40px;
        }
        .logo { font-size: 2.2rem; font-weight: bold; }
        main { max-width: 1000px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 50px; font-size: 3rem; }
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }
        .project-card {
            background: rgba(255,255,255,0.2);
            border-radius: 15px;
            padding: 25px;
            transition: all 0.4s;
        }
        .project-card:hover {
            transform: translateY(-10px);
            background: rgba(255,255,255,0.3);
        }
        .project-card h2 { margin-bottom: 15px; }
    </style>
</head>
<body>
    <header>
        <div class="logo">MySite</div>
    </header>
    <main>
        <h1>আমার প্রজেক্টস</h1>
        
        <div class="projects-grid">
            <div class="project-card">
                <h2>১. প্রথম ওয়েবসাইট</h2>
                <p>HTML + CSS দিয়ে বানানো এই পোর্টফোলিও সাইট।</p>
            </div>
            
            <div class="project-card">
                <h2>২. দ্বিতীয় প্রজেক্ট</h2>
                <p>এখানে পরে আরেকটা প্রজেক্ট যোগ করবো।</p>
            </div>
        </div>
        
        <p style="text-align:center; margin-top: 50px;">
            <a href="index.html" style="color:#ffd700; font-size: 1.2rem;">← হোমে ফিরে যাও</a>
        </p>
    </main>
</body>
</html>

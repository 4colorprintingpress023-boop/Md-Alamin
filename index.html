<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DesignCraft — Marketplace</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI}

body{
  background:#f6f3ff;
  color:#1a1a2e;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 25px;
  background:white;
  position:sticky;
  top:0;
  z-index:1000;
  box-shadow:0 2px 12px rgba(0,0,0,0.06);
}

.logo{
  font-size:22px;
  font-weight:900;
  color:#6d28d9;
}

nav a{
  margin:0 10px;
  text-decoration:none;
  color:#444;
  font-weight:500;
}

/* HERO (ShorifArt style colorful) */
.hero{
  padding:70px 20px;
  text-align:center;
  background:linear-gradient(135deg,#7c3aed,#06b6d4,#f59e0b);
  color:white;
  border-radius:0 0 40px 40px;
}

.hero h1{
  font-size:42px;
  font-weight:900;
}

.hero p{
  margin-top:10px;
  font-size:16px;
  opacity:0.9;
}

.hero-btn{
  margin-top:20px;
}

.hero-btn button{
  padding:12px 20px;
  border:none;
  margin:5px;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
}

.btn1{background:white;color:#6d28d9}
.btn2{background:#111;color:white}

/* CATEGORY */
.categories{
  display:flex;
  gap:10px;
  padding:20px;
  overflow-x:auto;
}

.cat{
  background:white;
  padding:8px 15px;
  border-radius:20px;
  cursor:pointer;
  border:1px solid #eee;
  white-space:nowrap;
  transition:0.2s;
}
.cat:hover{
  background:#6d28d9;
  color:white;
}

/* GRID */
.container{padding:20px}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

.card{
  background:white;
  border-radius:14px;
  overflow:hidden;
  cursor:pointer;
  box-shadow:0 5px 15px rgba(0,0,0,0.06);
  transition:0.3s;
}
.card:hover{transform:translateY(-5px)}

.card img{
  width:100%;
  height:170px;
  object-fit:cover;
}

.card-body{
  padding:10px;
}

.price{
  color:#6d28d9;
  font-weight:800;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
}

.modal-box{
  background:white;
  width:90%;
  max-width:650px;
  border-radius:12px;
  overflow:hidden;
}

.modal-box img{
  width:100%;
  max-height:400px;
  object-fit:contain;
}

.modal-content{
  padding:15px;
}

.btn{
  width:100%;
  padding:12px;
  border:none;
  margin-top:10px;
  border-radius:8px;
  font-weight:600;
  cursor:pointer;
}

.green{background:#10b981;color:white}
.purple{background:#6d28d9;color:white}

/* SECTION TITLE */
.section-title{
  text-align:center;
  font-size:24px;
  margin:30px 0 10px;
  font-weight:800;
}

/* FOOTER */
footer{
  text-align:center;
  padding:30px;
  background:#111;
  color:white;
  margin-top:40px;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div class="logo">DesignCraft</div>
  <div>
    <a href="#">Home</a>
    <a href="#shop">Shop</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <h1>Creative Design Marketplace</h1>
  <p>Premium Posters, Logos & Graphics — Download & Order Instantly</p>

  <div class="hero-btn">
    <button class="btn1">Browse Designs</button>
    <button class="btn2">Contact Me</button>
  </div>
</div>

<!-- CATEGORY -->
<div class="categories">
  <div class="cat" onclick="filter('all')">All</div>
  <div class="cat" onclick="filter('poster')">Poster</div>
  <div class="cat" onclick="filter('logo')">Logo</div>
  <div class="cat" onclick="filter('banner')">Banner</div>
</div>

<!-- SHOP -->
<div class="container" id="shop">
<div class="section-title">🔥 Trending Designs</div>

<div class="grid">

<!-- CARD -->
<div class="card" data-cat="poster"
onclick="openModal('design1.jpg','Festival Poster','High quality festival poster',299,'CODE1')">
  <img src="design1.jpg">
  <div class="card-body">
    <h4>Festival Poster</h4>
    <p class="price">৳299</p>
  </div>
</div>

<div class="card" data-cat="logo"
onclick="openModal('design2.jpg','Logo Design','Brand logo premium design',499,'CODE2')">
  <img src="design2.jpg">
  <div class="card-body">
    <h4>Logo Design</h4>
    <p class="price">৳499</p>
  </div>
</div>

</div>
</div>

<!-- MODAL -->
<div class="modal" id="modal" onclick="closeModal(event)">
  <div class="modal-box">
    <img id="img">
    <div class="modal-content">
      <h3 id="title"></h3>
      <p id="desc"></p>
      <p class="price" id="price"></p>

      <button class="btn green" onclick="download()">Download</button>
      <button class="btn purple" onclick="order()">Order WhatsApp</button>
    </div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  © 2026 DesignCraft — All Rights Reserved
</footer>

<script>

let file="", code="", name="";

function openModal(img,t,d,p,c){
  file=img;
  code=c;
  name=t;

  document.getElementById("img").src=img;
  document.getElementById("title").innerText=t;
  document.getElementById("desc").innerText=d;
  document.getElementById("price").innerText="৳ "+p;

  document.getElementById("modal").style.display="flex";
}

function closeModal(e){
  if(e.target.id==="modal")
    document.getElementById("modal").style.display="none";
}

function download(){
  let input=prompt("Enter download code:");
  if(input===code){
    let a=document.createElement("a");
    a.href=file;
    a.download=file;
    a.click();
  }else alert("Wrong code!");
}

function order(){
  let phone="8801761399365";
  let msg=`Hello,%0AI want this design:%0A${name}`;
  window.open(`https://wa.me/${phone}?text=${msg}`);
}

/* FILTER */
function filter(cat){
  let cards=document.querySelectorAll(".card");
  cards.forEach(c=>{
    c.style.display=(cat==="all" || c.dataset.cat===cat)?"block":"none";
  });
}

</script>

</body>
</html>

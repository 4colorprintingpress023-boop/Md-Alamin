<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আমার ওয়েবসাইট</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
        }
        header {
            background: rgba(255,255,255,0.15);
            padding: 1rem 0;
            position: sticky;
            top: 0;
        }
        nav {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }
        .logo { font-size: 2.3rem; font-weight: bold; }
        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 30px;
            font-weight: 500;
            transition: 0.3s;
        }
        .nav-links a:hover { color: #ffd700; transform: scale(1.1); }

        /* Hero Section - আরও আকর্ষণীয় */
        .hero {
            text-align: center;
            padding: 120px 20px 80px;
        }
        .hero h1 {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: fadeIn 1.5s;
        }
        .hero p {
            font-size: 1.5rem;
            max-width: 700px;
            margin: 0 auto 40px;
            opacity: 0.95;
        }
        .btn {
            background: white;
            color: #667eea;
            padding: 18px 45px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 1.3rem;
            font-weight: bold;
            display: inline-block;
            transition: all 0.4s;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .btn:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">MySite</div>
            <div class="nav-links">
                <a href="index.html">হোম</a>
                <a href="about.html">আমার সম্পর্কে</a>
                <a href="projects.html">প্রজেক্ট</a>
            </div>
        </nav>
    </header>

    <section class="hero">
        <h1>স্বাগতম আমার জগতে!</h1>
        <p>আমি ওয়েব ডেভেলপমেন্ট শিখছি। এখানে আমার প্রজেক্ট ও জার্নি দেখুন।</p>
        <a href="about.html" class="btn">আমার সম্পর্কে জানুন →</a>
    </section>
</body>
</html>

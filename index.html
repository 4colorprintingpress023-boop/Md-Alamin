<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ডিজাইন শপ | Fx Alamin</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f8f9fc; color: #1a1a2e; }

        header {
            background: linear-gradient(135deg, #6d28d9, #8b5cf6);
            color: white;
            padding: 20px 0;
            text-align: center;
        }
        .logo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            cursor: pointer;
        }
        .logo-area img {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: 4px solid white;
            object-fit: cover;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .logo-text {
            font-size: 2.4rem;
            font-weight: 700;
        }
        .subtitle {
            font-size: 1.1rem;
            opacity: 0.95;
        }

        .main-content {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
        }
        .profile-sidebar { text-align: center; min-width: 260px; }
        .profile-sidebar img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 5px solid #6d28d9;
        }

        .gallery {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }
        .card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            cursor: pointer;
        }
        .card:hover { transform: translateY(-8px); }
        .card img { width: 100%; height: 220px; object-fit: cover; }
        .card-info { padding: 15px; text-align: center; }
        .price { color: #6d28d9; font-weight: 700; }
    </style>
</head>
<body>
    <header>
        <div class="logo-area" onclick="window.location.href='index.html'">
            <img src="my-photo.jpg" alt="Fx Alamin">
            <div>
                <div class="logo-text">ডিজাইন শপ</div>
                <div class="subtitle">প্রিমিয়াম গ্রাফিক ডিজাইন রিসোর্স</div>
            </div>
        </div>
    </header>

    <div class="main-content">
        <!-- বাম পাশে প্রোফাইল -->
        <div class="profile-sidebar">
            <img src="my-photo.jpg" alt="Fx Alamin">
            <h2>Fx Alamin</h2>
            <p><strong>মোবাইল:</strong> ০১XXXXXXXXXX</p>
            <p>প্রফেশনাল গ্রাফিক ডিজাইনার</p>
        </div>

        <!-- ডান পাশে গ্যালারি -->
        <div class="gallery">
            <!-- তোমার ডিজাইন কার্ডগুলো এখানে থাকবে -->
            <div class="card" onclick="alert('ডিজাইন দেখা হচ্ছে...')">
                <img src="design1.jpg" alt="ফলের উৎসব">
                <div class="card-info">
                    <h3>ফলের উৎসব পোস্টার ২০২৬</h3>
                    <p class="price">৳ ২৯৯</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

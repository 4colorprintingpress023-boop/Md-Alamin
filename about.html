<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আমার সম্পর্কে</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        header {
            background: rgba(255,255,255,0.15);
            padding: 1rem 0;
            text-align: center;
            border-radius: 10px;
            margin-bottom: 40px;
        }
        .logo { font-size: 2.2rem; font-weight: bold; }
        main { max-width: 800px; margin: 0 auto; text-align: center; }
        h1 { font-size: 3rem; margin-bottom: 30px; }
        
        /* ছবি + অ্যানিমেশন */
        .profile-img {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            border: 6px solid white;
            margin: 20px 0;
            transition: all 0.5s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .profile-img:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        
        p { font-size: 1.3rem; line-height: 1.8; margin: 20px 0; }
        a { color: #ffd700; font-size: 1.2rem; }
    </style>
</head>
<body>
    <header>
        <div class="logo">MySite</div>
    </header>
    <main>
        <h1>আমার সম্পর্কে</h1>
        
        <!-- এখানে তোমার ছবি যোগ করো -->
        <img src="my-photo.png" alt="আমার ছবি" class="profile-img">
        
        <p>আমি ওয়েবসাইট বানানো শিখছি। এটা আমার প্রথম প্রজেক্ট। ধাপে ধাপে আরও সুন্দর করছি।</p>
        <p><a href="index.html">← হোমে ফিরে যাও</a></p>
    </main>
</body>
</html>
